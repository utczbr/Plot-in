name: Build Installer Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - install.py
      - install_*.sh
      - install_*.bat
      - install_*.command
      - installer/**
      - src/core/install_profile.py
      - src/requirements*.txt
      - config/advanced_settings.json
      - .github/workflows/installer-build.yml

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_tag: linux
            target: onefile
            ui_policy: auto
          - os: windows-latest
            os_tag: windows
            target: onefile
            ui_policy: auto
          - os: macos-latest
            os_tag: macos
            target: app
            ui_policy: gui

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build installer
        run: |
          python installer/build_executables.py --name chart-analysis-installer-${{ matrix.os_tag }} --target ${{ matrix.target }} --ui-policy ${{ matrix.ui_policy }}

      - name: Smoke test artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "app" ]]; then
            artifact="dist/chart-analysis-installer-${{ matrix.os_tag }}.app/Contents/MacOS/chart-analysis-installer-${{ matrix.os_tag }}"
          else
            artifact="dist/chart-analysis-installer-${{ matrix.os_tag }}"
          fi
          test -x "$artifact"
          "$artifact" --help >/dev/null
          "$artifact" --ui-mode cli --help >/dev/null

      - name: Smoke test artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "dist/chart-analysis-installer-${{ matrix.os_tag }}.exe"
          if (-not (Test-Path $artifact)) {
            throw "Artifact not found: $artifact"
          }
          & $artifact --help | Out-Null
          & $artifact --ui-mode cli --help | Out-Null

      - name: Prepare macOS signing keychain
        if: runner.os == 'macOS' && secrets.APPLE_DEVELOPER_ID_CERTIFICATE != '' && secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != ''
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/chart-analysis-signing.keychain-db"
          export CERT_PATH
          python - <<'PY'
import base64
import os
from pathlib import Path

certificate = os.environ["APPLE_DEVELOPER_ID_CERTIFICATE"]
Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(certificate))
PY
          security create-keychain -p "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

      - name: Sign and verify macOS app
        if: runner.os == 'macOS' && secrets.APPLE_DEVELOPER_ID_CERTIFICATE != '' && secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="dist/chart-analysis-installer-${{ matrix.os_tag }}.app"
          test -d "$APP_PATH"
          codesign --deep --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

      - name: Notarize and staple macOS app
        if: runner.os == 'macOS' && secrets.APPLE_DEVELOPER_ID_CERTIFICATE != '' && secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="dist/chart-analysis-installer-${{ matrix.os_tag }}.app"
          ZIP_PATH="$RUNNER_TEMP/chart-analysis-installer-${{ matrix.os_tag }}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"

      - name: Warn when macOS signing is skipped
        if: runner.os == 'macOS' && (secrets.APPLE_DEVELOPER_ID_CERTIFICATE == '' || secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD == '' || secrets.APPLE_SIGNING_IDENTITY == '' || secrets.APPLE_ID == '' || secrets.APPLE_APP_SPECIFIC_PASSWORD == '' || secrets.APPLE_TEAM_ID == '')
        run: |
          echo "::warning::macOS artifact is unsigned/not notarized because required Apple secrets are missing."
          echo "::warning::Artifact is suitable for internal testing only."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart-analysis-installer-${{ matrix.os_tag }}
          path: |
            dist/chart-analysis-installer-${{ matrix.os_tag }}*
            dist/chart-analysis-installer-${{ matrix.os_tag }}.app
          if-no-files-found: error
